openapi: 3.0.3
info:
  title: HyperBrain Users & Sync API
  description: API REST para gestión de usuarios, credenciales de sincronización e interacciones de satélites en el ecosistema HyperBrain.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo local
paths:
  /users:
    get:
      summary: Obtener el perfil del usuario autenticado
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysUser'
  /sync/credentials:
    get:
      summary: Listar credenciales de sincronización
      responses:
        '200':
          description: Lista de credenciales configuradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncCredential'
    post:
      summary: Registrar o actualizar credencial de integración
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncCredentialInput'
      responses:
        '201':
          description: Credencial registrada
components:
  schemas:
    SysUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, USER]
    SyncCredential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [NOTION, APPLE, N8N]
        expires_at:
          type: string
          format: date-time
    SyncCredentialInput:
      type: object
      required:
        - provider
        - access_token
      properties:
        provider:
          type: string
          enum: [NOTION, APPLE, N8N]
        access_token:
          type: string
        refresh_token:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
