site_name: HyperBrain Docs
site_url: https://dacaitac.github.io/HyperBrain-docs/
site_description: Base de conocimiento de ingeniería del proyecto HyperBrain
site_author: dacaitac

repo_name: dacaitac/HyperBrain-docs
repo_url: https://github.com/dacaitac/HyperBrain-docs

theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: deep orange
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: deep orange
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_mermaid_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Producto:
      - 01-product/index.md
      - Visión del Producto: 01-product/vision.md
      - Sesión JAD: 01-product/jad-session.md
      - Épicas:
          - 01-product/epics/index.md
      - Requerimientos:
          - 01-product/requirements/index.md
          - Requerimientos Funcionales: 01-product/requirements/functional.md
          - Requerimientos No Funcionales: 01-product/requirements/non-functional.md
          - HU-01 Generación de Agenda: 01-product/requirements/HU-01.md
          - HU-02 Replanificación: 01-product/requirements/HU-02.md
          - HU-03 Captura de Ideas: 01-product/requirements/HU-03.md
          - HU-04 Evaluación IA: 01-product/requirements/HU-04.md
          - HU-05 Throttling: 01-product/requirements/HU-05.md
          - HU-06 Transacciones: 01-product/requirements/HU-06.md
          - HU-07 Presupuestos: 01-product/requirements/HU-07.md
          - HU-08 Metas Financieras: 01-product/requirements/HU-08.md
          - HU-09 Sync iOS: 01-product/requirements/HU-09.md
          - HU-10 Sync Notion: 01-product/requirements/HU-10.md
          - HU-11 Tolerancia Fallos: 01-product/requirements/HU-11.md
          - HU-12 Despliegue: 01-product/requirements/HU-12.md
          - HU-13 Observabilidad: 01-product/requirements/HU-13.md
  - Arquitectura:
      - 02-architecture/index.md
      - Stack Tecnológico: 02-architecture/tech-stack.md
      - Despliegue: 02-architecture/deployment.md
      - Componentes: 02-architecture/components.md
      - Modelo de Datos (ERD): 02-architecture/data-model.md
      - Diagramas Eraser: 02-architecture/diagrams.md
      - Motores:
          - Prioritizer: 02-architecture/engines/prioritizer.md
          - Agenda Planner: 02-architecture/engines/planner.md
          - Learning Engine: 02-architecture/engines/learning.md
          - Finance Engine: 02-architecture/engines/finance.md
          - Messaging (EDA): 02-architecture/engines/messaging.md
      - Bases Teóricas:
          - 4DX: 02-architecture/theory/4dx.md
          - GTD: 02-architecture/theory/gtd.md
          - Spaced Repetition: 02-architecture/theory/spaced-repetition.md
          - Triángulo de Control: 02-architecture/theory/triangle-of-control.md
  - ADRs:
      - 03-adrs/index.md
      - ADR-001 SQS vs Kafka: 03-adrs/ADR-001-sqs-over-kafka.md
  - Contratos:
      - 04-contracts/index.md
  - Ecosistema:
      - 05-ecosystem/index.md
  - Agentes y Skills:
      - 06-agents-and-skills/index.md
  - Workflows:
      - 07-workflows/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dacaitac/HyperBrain-docs

