site_name: HyperBrain Docs
site_url: https://dacaitac.github.io/HyperBrain-docs/
site_description: Documentación oficial del proyecto HyperBrain
site_author: dacaitac

repo_name: dacaitac/HyperBrain-docs
repo_url: https://github.com/dacaitac/HyperBrain-docs

theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Guía de Inicio:
      - Instalación: getting-started/installation.md
      - Configuración: getting-started/configuration.md
  - Arquitectura:
      - Visión General: architecture/overview.md
  - API:
      - Referencia: api/reference.md
  - Contribuir: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dacaitac/HyperBrain-docs

copyright: Copyright &copy; 2026 HyperBrain
